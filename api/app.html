<!doctype html><html><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<style>
:root{--bg:var(--tg-theme-bg-color,#0f1115);--sec:var(--tg-theme-secondary-bg-color,#171a21);--txt:var(--tg-theme-text-color,#fff);--hint:var(--tg-theme-hint-color,#8b93a1);--btn:var(--tg-theme-button-color,#5b8def);--btntxt:var(--tg-theme-button-text-color,#fff);--link:var(--tg-theme-link-color,#6ab0ff)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:28px}
.hero{padding:24px 18px 14px;text-align:center;background:radial-gradient(120% 90% at 50% 0%,rgba(91,141,239,.28),transparent 70%)}
.logo{font-size:38px}.hero h1{margin:6px 0 2px;font-size:22px;font-weight:800}.hero p{margin:0;color:var(--hint);font-size:13px}
.tabs{display:flex;gap:8px;padding:12px 16px 6px;position:sticky;top:0;background:var(--bg);z-index:5}
.tab{flex:1;text-align:center;padding:9px 6px;border-radius:12px;background:var(--sec);color:var(--hint);font-weight:700;font-size:11.5px;line-height:1.2;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tab.active{background:var(--btn);color:var(--btntxt)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 16px}
.card{background:var(--sec);border-radius:16px;padding:14px;cursor:pointer;transition:.12s;border:1px solid transparent}
.card:active{transform:scale(.97);border-color:var(--btn)}.card .e{font-size:26px}.card .t{font-weight:700;font-size:13.5px;margin:8px 0 4px;line-height:1.25}.card .p{color:var(--link);font-weight:700;font-size:12.5px}
.pad{padding:16px}.box{background:var(--sec);border-radius:16px;padding:18px}
.link{background:var(--bg);border-radius:10px;padding:12px;font-size:13px;word-break:break-all;color:var(--link);margin:10px 0}
.stats{display:flex;gap:10px;margin:12px 0}.stat{flex:1;background:var(--bg);border-radius:12px;padding:12px;text-align:center}.stat b{display:block;font-size:18px}.stat span{color:var(--hint);font-size:11px}
.big{width:100%;padding:14px;border:0;border-radius:14px;background:var(--btn);color:var(--btntxt);font-weight:800;font-size:15px;cursor:pointer}
.muted{color:var(--hint);font-size:13px;line-height:1.6}
.sheet{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:20}.sheet.on{display:flex}
.panel{width:100%;background:var(--bg);border-radius:20px 20px 0 0;padding:18px 18px 26px;animation:up .2s ease;max-height:90vh;overflow-y:auto}@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.panel h2{margin:4px 0 2px;font-size:19px}.panel .sub{color:var(--hint);font-size:13px;margin-bottom:12px}
textarea{width:100%;min-height:84px;background:var(--sec);border:0;border-radius:12px;color:var(--txt);padding:12px;font-size:14px;font-family:inherit;resize:none}
.row{display:flex;gap:10px;margin-top:12px}.ghost{flex:0 0 auto;padding:14px 16px;border:0;border-radius:14px;background:var(--sec);color:var(--txt);font-weight:700;cursor:pointer}.hide{display:none}
</style></head><body>

 greet:{en:n=>'Hi '+n+' — create a gift below',ru:n=>'Привет, '+n+' — выбери подарок ниже',es:n=>'Hola '+n+' — elige un regalo'},
 create:{en:'🎨 Create',ru:'🎨 Создать',es:'🎨 Crear'},earn:{en:'💸 Earn',ru:'💸 Заработок',es:'💸 Ganar'},info:{en:'ℹ️ How it works',ru:'ℹ️ Как это работает',es:'ℹ️ Cómo funciona'}, exBook:{en:'Free book gift',ru:'Книга в подарок',es:'Libro de regalo'}, earnFull:{en:'💸 AIfa referral system — up to 50% on EVERY sale\n\nHow it works:\n• Share your link. Anyone who joins and buys is tied to you forever — you earn a % of all their purchases automatically. IMPORTANT: the % is from the amount WE actually receive (after Telegram/platform fee, ~30% on mobile), not the sticker price. We never deduct generation costs, only the platform fee.\n\n📈 Your rate for the week depends on the PREVIOUS week sales:\n• base — 30%\n• 10+ sales in a week → next week 40%\n• 60+ sales in a week → next week 50%\nHit the weekly target and you keep the higher rate all next week. Miss it and you go back to base 30%. The week counter resets Monday 00:00 UTC.\n\n💵 Everything accrues automatically and shows above: current rate, sales this week, earned, all-time.\n\nTip: put your link in your bio and videos — income flows passively.',ru:'💸 Реферальная система AIfa — до 50% с КАЖДОЙ продажи\n\nКак это работает:\n• Делишься ссылкой. Любой, кто перейдёт и купит, закрепляется за тобой навсегда — ты получаешь % с каждой его покупки автоматически. ВАЖНО: % считается от суммы, которую реально получаем МЫ (за вычетом комиссии Telegram, ~30% на мобайле), а не от ценника. Расходы на генерацию мы не вычитаем — только комиссию платформы.\n\n📈 Твоя ставка на неделю зависит от продаж ПРОШЛОЙ недели:\n• базовая — 30%\n• 10+ продаж за неделю → следующая неделя 40%\n• 60+ продаж за неделю → следующая неделя 50%\nВыполнил недельную планку — всю следующую неделю повышенный %. Не выполнил — базовые 30%. Счётчик недели обнуляется в понедельник 00:00 UTC.\n\n💵 Всё начисляется автоматически и видно выше: ставка сейчас, продажи за неделю, заработано, за всё время.\n\nСовет: размести ссылку в профиле и видео — доход капает пассивно.',es:'💸 Sistema de referidos AIfa — hasta 50% en CADA venta\n\nCómo funciona:\n• Comparte tu enlace. Quien entre y compre queda ligado a ti para siempre. IMPORTANTE: el % es sobre lo que recibimos NOSOTROS (tras la comisión de Telegram, ~30% en móvil), no el precio. No descontamos costes de generación, solo la comisión de la plataforma.\n\n📈 Tu tarifa de la semana depende de las ventas de la semana PASADA:\n• base — 30%\n• 10+ ventas → la próxima 40%\n• 60+ ventas → la próxima 50%\nCumple la meta semanal y mantienes la tarifa alta toda la próxima semana. Si no, vuelves a base 30%. El contador se reinicia el lunes 00:00 UTC.\n\n💵 Todo se acumula automáticamente y se ve arriba.'},howFull:{en:'ℹ️ How AIfa Creativity works\n\nAIfa is an AI that creates personal gifts in seconds, right inside Telegram.\n\n1️⃣ Pick a gift in the «Create» tab — 13 types: vocal songs & instrumentals, astrology, name secrets, images, poems, love letters, dream readings, couple compatibility, 3-card tarot, interactive tale & detective, year-ahead forecast.\n2️⃣ Tap «🎬 See a sample» to preview the result first.\n3️⃣ Describe what you want (name, occasion, mood) and pay with ⭐ Telegram Stars.\n4️⃣ AIfa generates it with real AI and sends it to your chat in seconds.\n\n🎁 Bonuses: free PADAM Protocol book, date reminders, gift-to-a-friend.\n💸 Earn: share your link and get up to 50% of every sale («Earn» tab).\n\nPayment is ⭐ Telegram Stars only — safe and instant. No spam, everything on request.',ru:'ℹ️ Как работает AIfa Creativity\n\nAIfa — это ИИ, который создаёт персональные подарки за секунды, прямо в Telegram.\n\n1️⃣ Выбираешь подарок во вкладке «Создать» — 13 видов: песни с вокалом и инструменталы, астрология, тайны имени, изображения, стихи, любовные письма, толкование снов, совместимость пары, таро на 3 карты, интерактивная сказка и детектив, прогноз на год вперёд.\n2️⃣ Жмёшь «🎬 Посмотреть образец» — заранее видишь пример результата.\n3️⃣ Описываешь, что хочешь (имя, повод, настроение) и оплачиваешь ⭐ Telegram Stars.\n4️⃣ AIfa генерирует подарок настоящим ИИ и присылает прямо в чат за секунды.\n\n🎁 Бонусы: бесплатная книга PADAM Protocol, напоминания о важных датах, возможность подарить другу.\n💸 Зарабатывай: делись ссылкой и получай до 50% с каждой продажи (вкладка «Заработок»).\n\nОплата — только ⭐ Telegram Stars: безопасно и мгновенно. Никакого спама, всё строго по твоему запросу.',es:'ℹ️ Cómo funciona AIfa Creativity\n\nAIfa es una IA que crea regalos personales en segundos, dentro de Telegram.\n\n1️⃣ Elige un regalo en «Crear» — 13 tipos: canciones con voz e instrumentales, astrología, secretos del nombre, imágenes, poemas, cartas de amor, sueños, compatibilidad, tarot de 3 cartas, cuento y detective interactivos, pronóstico del año.\n2️⃣ Toca «🎬 Ver ejemplo» para previsualizar.\n3️⃣ Describe lo que quieres y paga con ⭐ Telegram Stars.\n4️⃣ AIfa lo genera con IA real y lo envía al chat en segundos.\n\n🎁 Bonos: libro PADAM Protocol gratis, recordatorios, regalar a un amigo.\n💸 Gana: comparte tu enlace y recibe hasta 50% de cada venta.\n\nPago solo con ⭐ Telegram Stars: seguro e instantáneo.'},bookPick:{en:'📖 Choose your book language:',ru:'📖 Выбери язык книги:',es:'📖 Elige el idioma del libro:'},exRem:{en:'Date reminders',ru:'Напоминания о датах',es:'Recordatorios'},exGift:{en:'Gift to a friend',ru:'Подарить другу',es:'Regalar a un amigo'},remLabelPh:{en:'What to remember (e.g. Mom birthday)',ru:'Что напомнить (напр. ДР мамы)',es:'Qué recordar'},remSave:{en:'Save reminder',ru:'Сохранить',es:'Guardar'},sending:{en:'Sending to chat…',ru:'Отправляю в чат…',es:'Enviando al chat…'},bookSent:{en:'📖 The book has been sent to your chat — enjoy!',ru:'📖 Книга отправлена тебе в чат — приятного чтения!',es:'📖 El libro fue enviado a tu chat.'},remOk:{en:'🎂 Reminder saved! I will ping you 3 days before.',ru:'🎂 Напоминание сохранено! Напомню за 3 дня.',es:'🎂 Recordatorio guardado.'},remBad:{en:'Add a title and a date as DD.MM',ru:'Укажи название и дату в формате ДД.ММ',es:'Pon título y fecha DD.MM'},

 wk:{en:'this week',ru:'за неделю',es:'esta semana'},earned:{en:'earned',ru:'заработано',es:'ganado'},all:{en:'all-time',ru:'за всё время',es:'histórico'},
 share:{en:'📤 Share my link',ru:'📤 Поделиться ссылкой',es:'📤 Compartir enlace'},
 howT:{en:'📖 How AIfa works',ru:'📖 Как работает AIfa',es:'📖 Cómo funciona AIfa'},
 howB:{en:'Pick a gift, pay with ⭐ Stars, and I generate it with real AI in seconds — delivered right in the chat.\n\n🎵 Instrumental & 🎤 vocal songs · 🔮 astrology · 🔡 name secrets · 🖼 images · 📝 poems · 💌 love letters · 🌙 dream reading · ❤️ compatibility · 🃏 tarot · 📖 interactive tale · 🕵️ detective · 🔭 year-ahead · 📖 free book gift.\n\n💸 Share your link to earn 30–50% of every sale.',ru:'Выбери подарок, оплати ⭐ Stars — и я сгенерирую его настоящим AI за секунды, прямо в чат.\n\n🎵 Инструментал и 🎤 песни с вокалом · 🔮 астрология · 🔡 тайны имени · 🖼 картинки · 📝 стихи · 💌 любовные письма · 🌙 толкование снов · ❤️ совместимость · 🃏 таро · 📖 интерактивная сказка · 🕵️ детектив · 🔭 год вперёд · 📖 книга в подарок.\n\n💸 Дели ссылку и получай 30–50% с каждой продажи.',es:'Elige un regalo, paga con ⭐ Stars y lo genero con IA real en segundos, en el chat.\n\n🎵 Instrumentales y 🎤 canciones con voz · 🔮 astrología · 🔡 secretos del nombre · 🖼 imágenes · 📝 poemas · 💌 cartas de amor · 🌙 sueños · ❤️ compatibilidad · 🃏 tarot · 📖 cuento interactivo · 🕵️ detective · 🔭 año · 📖 libro de regalo.\n\n💸 Comparte tu enlace y gana 30–50%.'},
};

 song:{e:'🎵',n:{en:'Instrumental',ru:'Инструментал',es:'Instrumental'},h:{en:'Style, mood, occasion',ru:'Стиль, настроение, повод',es:'Estilo, ánimo, ocasión'}},

const $=id=>document.getElementById(id);let cur=null;

async function api(p,b){const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...b,initData:tg.initData,ref:REF})});return r.json();}
var ALLP=[];
async function loadProducts(){const r=await fetch('/api/products');const list=await r.json();ALLP=list;const g=$('grid');g.innerHTML='';
 list.forEach(p=>{const m=PROD[p.sku];if(!m)return;const c=document.createElement('div');c.className='card';
 var _d=(p.desc&&p.desc[L])?p.desc[L].replace(/<[^>]+>/g,''):'';var _ds=_d.length>95?_d.slice(0,95).trim()+'…':_d;c.innerHTML='<div class="e">'+m.e+'</div><div class="t">'+m.n[L]+'</div><div class="p">$'+(p.price_usd_cents/100).toFixed(2)+' · ⭐'+p.price_stars+'</div><div style="font-size:11px;color:var(--hint);margin-top:5px;line-height:1.35">'+_ds+'</div>';
 c.onclick=()=>open(p,m);g.appendChild(c);});}
function open(p,m){cur=p;$('pTitle').textContent=m.e+' '+m.n[L];$('pSub').textContent='⭐ '+p.price_stars+' · $'+(p.price_usd_cents/100).toFixed(2);
 $('pInput').value='';$('pInput').placeholder=m.h[L];$('pPay').textContent=tr('pay')+p.price_stars;$('pNote').textContent=tr('paynote');$('pDesc').innerHTML=(p.desc&&p.desc[L])?p.desc[L]:'';var sm=$('pSample');sm.style.display='none';sm.innerHTML='';var sb=$('pSampleBtn');sb.textContent=tr('sampleBtn');sb.disabled=false;sb.onclick=async()=>{sb.disabled=true;sb.textContent=tr('sampleWait');try{var res=await api('/api/sample',{sku:p.sku,lang:L});if(res&&(res.text||res.img)){var h='';if(res.img)h+='<img src="'+res.img+'" style="width:100%;border-radius:10px;margin-bottom:8px">';if(res.text)h+=res.text.replace(/</g,'&lt;');if(res.note)h+='\n\n'+tr('sampleNote');sm.innerHTML=h;sm.style.display='block';}else{sm.textContent=tr('sampleErr');sm.style.display='block';}}catch(e){sm.textContent=tr('sampleErr');sm.style.display='block';}sb.disabled=false;sb.textContent=tr('sampleBtn');};$('sheet').classList.add('on');try{tg.HapticFeedback.impactOccurred('light');}catch(e){}}
$('pCancel').onclick=()=>$('sheet').classList.remove('on');

function ding(){try{var a=new (window.AudioContext||window.webkitAudioContext)();var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.setValueAtTime(880,a.currentTime);o.frequency.exponentialRampToValueAtTime(1320,a.currentTime+0.12);g.gain.setValueAtTime(0.001,a.currentTime);g.gain.exponentialRampToValueAtTime(0.25,a.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.4);o.start();o.stop(a.currentTime+0.42);}catch(e){}}
function confetti(){var c=document.createElement('canvas');c.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999';c.width=innerWidth;c.height=innerHeight;document.body.appendChild(c);var x=c.getContext('2d');var cols=['#7b61ff','#ff61c7','#ffd93b','#4fd1c5','#ff7a59','#5b8cff'];var P=[];for(var i=0;i<140;i++)P.push({x:innerWidth/2,y:innerHeight/3,vx:(Math.random()-0.5)*11,vy:Math.random()*-13-3,g:0.32,s:5+Math.random()*6,c:cols[i%cols.length],r:Math.random()*6,vr:(Math.random()-0.5)*0.5});var t0=Date.now();(function f(){x.clearRect(0,0,c.width,c.height);for(var i=0;i<P.length;i++){var p=P[i];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;x.save();x.translate(p.x,p.y);x.rotate(p.r);x.fillStyle=p.c;x.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);x.restore();}if(Date.now()-t0<2600)requestAnimationFrame(f);else c.remove();})();}

function appExtras(s){

function renderSeason(){

}
